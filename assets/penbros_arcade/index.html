<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Penguin Brothers Arcade</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        #game-wrapper {
            position: fixed;
            inset: 0;
        }
    </style>
</head>
<body>
<div id="game-wrapper">
    <div id="game"></div>
</div>

<script type="text/javascript">
    EJS_player = '#game';
    EJS_core = 'fbneo';
    EJS_gameName = 'Penguin Brothers';
    EJS_gameUrl = 'penbros.zip';
    EJS_pathtodata = 'emulatorjs/data/';
    EJS_backgroundColor = '#000000';
    EJS_startButtonName = 'Tap to Play';

    // Everything is served from the local asset server; avoid any external lookups.
    EJS_language = 'en-US';
    EJS_disableAutoLang = false;
    EJS_disableDatabases = true;
    // The local server sends COOP/COEP headers, so SharedArrayBuffer is
    // available and the threaded core can be used.
    EJS_threads = typeof SharedArrayBuffer === 'function';

    // The native 320x240 output looks blocky stretched across a phone
    // screen; ScaleHQ smooths pixel edges. 2x is used instead of 4x to keep
    // GPU cost low on budget phones. Users can switch to a CRT look
    // (or disable) in Settings > Shaders.
    EJS_defaultOptions = {
        'shader': '2xScaleHQ.glslp',
        'vsync': 'enabled'
    };

    // Surface perf-relevant environment info in the app logs.
    console.log('[penbros env] SharedArrayBuffer: ' +
        (typeof SharedArrayBuffer === 'function') +
        ', crossOriginIsolated: ' + self.crossOriginIsolated +
        ', threads: ' + EJS_threads +
        ', cores: ' + (navigator.hardwareConcurrency || '?') +
        ', dpr: ' + window.devicePixelRatio);

    // Save states are unreliable for this driver; hide the related menu items.
    EJS_Buttons = {
        saveState: false,
        loadState: false,
        quickSave: false,
        quickLoad: false,
        screenRecord: false,
        screenshot: false,
        cheat: false,
        netplay: false,
        saveSavFiles: false,
        loadSavFiles: false,
        cacheManager: false
    };

    // Penguin Brothers is a joystick + 2 button game.
    // FBNeo RetroPad mapping: B (0) = Fire 1 (throw snowball), A (8) = Fire 2 (jump),
    // Select (2) = Insert Coin, Start (3) = Start.
    EJS_VirtualGamepadSettings = [
        {
            type: 'dpad',
            id: 'dpad',
            location: 'left',
            left: '50%',
            top: '50%',
            joystickInput: false,
            inputValues: [4, 5, 6, 7]
        },
        {
            type: 'button',
            text: 'JUMP',
            id: 'a',
            location: 'right',
            left: 81,
            top: 40,
            bold: true,
            fontSize: 13,
            input_value: 8
        },
        {
            type: 'button',
            text: 'THROW',
            id: 'b',
            location: 'right',
            left: 10,
            top: 70,
            bold: true,
            fontSize: 12,
            input_value: 0
        },
        {
            type: 'button',
            text: 'Start',
            id: 'start',
            location: 'center',
            left: 60,
            fontSize: 15,
            block: true,
            input_value: 3
        },
        {
            type: 'button',
            text: 'Coin',
            id: 'coin',
            location: 'center',
            left: -5,
            fontSize: 15,
            block: true,
            input_value: 2
        }
    ];
</script>
<script src="emulatorjs/data/loader.js"></script>
</body>
</html>
